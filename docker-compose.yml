version: "3.9"

services:
  backend:
    build: ./backend
    container_name: jobtracker-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////app/data/jobtracker.db
      - TZ=Europe/Berlin
    volumes:
      - jobtracker-data:/app/data
    ports:
      - "8000:8000"
    networks:
      default:
        ipv4_address: 192.168.117.10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
    container_name: jobtracker-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      default:
        ipv4_address: 192.168.117.11
    depends_on:
      - backend

volumes:
  jobtracker-data:

networks:
  default:
    ipam:
      config:
        - subnet: 192.168.117.0/24

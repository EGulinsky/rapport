name: rapport

services:
  backend:
    build: ./backend
    container_name: rapport-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////app/data/jobtracker.db
      - TZ=Europe/Berlin
      - LOG_LEVEL=INFO
      - SEQ_URL=http://seq:5341
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - jobtracker-data:/app/data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  seq:
    image: datalust/seq:latest
    container_name: rapport-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq-data:/data
    ports:
      - "8088:80"
      - "5341:5341"

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
    container_name: rapport-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  jobtracker-data:
    name: jobtracker_jobtracker-data
  seq-data:
    name: jobtracker_seq-data

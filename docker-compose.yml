version: "3.9"

services:
  backend:
    build: ./backend
    container_name: jobtracker-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////app/data/jobtracker.db
      - TZ=Europe/Berlin
      - LOG_LEVEL=INFO
      - SEQ_URL=http://seq:5341
    volumes:
      - jobtracker-data:/app/data
    ports:
      - "8000:8000"
    networks:
      default:
        ipv4_address: 192.168.117.10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle:
    image: amir20/dozzle:latest
    container_name: jobtracker-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:8080"
    environment:
      - DOZZLE_FILTER=name=jobtracker
    networks:
      default:
        ipv4_address: 192.168.117.12

  seq:
    image: datalust/seq:latest
    container_name: jobtracker-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq-data:/data
    ports:
      - "8088:80"
      - "5341:5341"
    networks:
      default:
        ipv4_address: 192.168.117.13

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
    container_name: jobtracker-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      default:
        ipv4_address: 192.168.117.11
    depends_on:
      - backend

volumes:
  jobtracker-data:
  seq-data:

networks:
  default:
    ipam:
      config:
        - subnet: 192.168.117.0/24

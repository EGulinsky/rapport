# Isolierte 1:1-Testumgebung — eigene, leere Datenbank, eigenes Volume,
# eigenes Netzwerk, eigene Ports. Berührt nie die Produktivinstanz
# (docker-compose.yml). Über das Frontend ganz normal bedienbar, deutlich
# als Testumgebung markiert (roter Banner oben, via VITE_ENV_LABEL).
#
# Start:   docker compose -p rapport-test -f docker-compose.test.yml up -d --build
# Stop:    docker compose -p rapport-test -f docker-compose.test.yml down
# Reset:   docker compose -p rapport-test -f docker-compose.test.yml down -v   (löscht auch die Test-DB)
#
# GUI:     http://localhost:3001
# API:     http://localhost:8001/docs

services:
  backend-test:
    build: ./backend
    container_name: rapport-backend-test
    environment:
      - DATABASE_URL=sqlite:////app/data/jobtracker.db
      - TZ=Europe/Berlin
      - LOG_LEVEL=INFO
      - SEQ_URL=http://seq-not-used:5341
      - FILES_BRIDGE_URL=http://host.docker.internal:9998
      - E2E_TESTING=true
    volumes:
      - rapport-test-data:/app/data
      - ./backend/tests:/app/tests
      - ./backend/requirements-dev.txt:/app/requirements-dev.txt
    ports:
      - "8001:8000"
    networks:
      default:
        ipv4_address: 192.168.118.10

  e2e-runner:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: rapport-e2e
    environment:
      - E2E_BASE_URL=http://frontend-test:80
      - E2E_API_URL=http://backend-test:8000
    volumes:
      # docker compose run ignores container_name and mints a fresh
      # <project>-<service>-run-<hash> name each time — a JUnit report
      # collected via `docker cp <fixed-name>:...` after the fact would
      # therefore always miss. Writing straight to a bind-mounted host
      # directory sidesteps the container-name guessing game entirely.
      - ./e2e-report:/app/e2e/e2e-report
    networks:
      default:
        ipv4_address: 192.168.118.12
    depends_on:
      - backend-test
      - frontend-test

  frontend-test:
    build:
      context: ./frontend
      args:
        ENV_LABEL: "⚠ TESTUMGEBUNG — nicht die echten Daten"
        NGINX_CONF: nginx.test.conf
    container_name: rapport-frontend-test
    ports:
      - "3001:80"
    networks:
      default:
        ipv4_address: 192.168.118.11
    depends_on:
      - backend-test

volumes:
  rapport-test-data:

networks:
  default:
    ipam:
      config:
        - subnet: 192.168.118.0/24

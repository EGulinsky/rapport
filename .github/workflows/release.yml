name: Release Agent Installers

# Builds the Rapport Agent installer for macOS/Windows/Linux and attaches
# them to a GitHub release. Deliberately decoupled from ci.yml's push-
# triggered jobs — this only runs when a release is published (or manually
# via workflow_dispatch), not on every push to main.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installers to (e.g. v4.3.5)"
        required: true

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging.txt

      - name: Build .dmg
        working-directory: agent
        run: packaging/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/Rapport-Agent-${{ steps.version.outputs.version }}.dmg" \
            --clobber

  windows:
    name: Build Windows .zip
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging\requirements-packaging-windows.txt

      - name: Build .zip
        working-directory: agent
        run: packaging\build_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/Rapport-Agent-${{ steps.version.outputs.version }}-windows.zip" \
            --clobber

  linux:
    name: Build Linux .tar.gz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging-linux.txt

      - name: Build .tar.gz
        working-directory: agent
        run: bash packaging/build_linux.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/rapport-agent-${{ steps.version.outputs.version }}-linux.tar.gz" \
            --clobber

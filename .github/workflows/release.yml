name: Release Artifacts

# Builds and publishes everything attached to a GitHub release: the Rapport
# Agent installer for macOS/Windows/Linux, the Rapport Installer (backend/
# frontend bootstrap) for the same three platforms, and the backend/frontend
# Docker images themselves (pushed to GHCR so the installer can `docker pull`
# prebuilt images instead of building Chromium locally). Deliberately
# decoupled from ci.yml's push-triggered jobs — this only runs when a
# release is published (or manually via workflow_dispatch), not on every
# push to main.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installers to (e.g. v4.3.5)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish-images:
    name: Publish backend/frontend images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Chromium install is the slow part (~20 apt packages + playwright
      # install chromium) and rarely changes — GHA cache means a release
      # with no Dockerfile.playwright-base/requirements.txt changes reuses
      # the cached layers instead of reinstalling Chromium from scratch.
      # load: true (alongside push) puts it in this runner's local Docker
      # daemon too — backend/Dockerfile's `FROM rapport-playwright-base:latest`
      # is a bare local tag (unchanged from the existing self-hosted deploy
      # flow), so the next step needs to find it locally, not just in GHCR.
      - name: Build + push playwright base image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.playwright-base
          platforms: linux/amd64
          push: true
          load: true
          tags: |
            ghcr.io/egulinsky/rapport-playwright-base:latest
            rapport-playwright-base:latest
          cache-from: type=gha,scope=playwright-base
          cache-to: type=gha,mode=max,scope=playwright-base

      - name: Build + push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/egulinsky/rapport-backend:${{ steps.version.outputs.version }}
            ghcr.io/egulinsky/rapport-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build + push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
          tags: |
            ghcr.io/egulinsky/rapport-frontend:${{ steps.version.outputs.version }}
            ghcr.io/egulinsky/rapport-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # GHCR packages pushed via GITHUB_TOKEN default to private regardless
      # of repo visibility — without this, an end user's `docker pull` on
      # the installer's bundled compose file fails with "unauthorized".
      # Idempotent, safe to run on every release.
      - name: Make packages public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in rapport-backend rapport-frontend rapport-playwright-base; do
            gh api --method PATCH "/user/packages/container/${pkg}" -f visibility=public \
              || echo "::warning::Could not set ${pkg} to public — check package visibility manually in GHCR settings."
          done

  macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging.txt

      - name: Build .dmg
        working-directory: agent
        run: packaging/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/Rapport-Agent-${{ steps.version.outputs.version }}.dmg" \
            --clobber

  windows:
    name: Build Windows .zip
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging\requirements-packaging-windows.txt

      - name: Build .zip
        working-directory: agent
        run: packaging\build_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/Rapport-Agent-${{ steps.version.outputs.version }}-windows.zip" \
            --clobber

  linux:
    name: Build Linux .tar.gz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: agent
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging-linux.txt

      - name: Build .tar.gz
        working-directory: agent
        run: bash packaging/build_linux.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "agent/packaging/dist/rapport-agent-${{ steps.version.outputs.version }}-linux.tar.gz" \
            --clobber

  installer-macos:
    name: Build Rapport Installer macOS .dmg
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: installer
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging.txt

      - name: Build .dmg
        working-directory: installer
        run: packaging/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "installer/packaging/dist/Rapport-Installer-${{ steps.version.outputs.version }}.dmg" \
            --clobber

  installer-windows:
    name: Build Rapport Installer Windows .zip
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: installer
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging\requirements-packaging-windows.txt

      - name: Build .zip
        working-directory: installer
        run: packaging\build_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "installer/packaging/dist/Rapport-Installer-${{ steps.version.outputs.version }}-windows.zip" \
            --clobber

  installer-linux:
    name: Build Rapport Installer Linux .tar.gz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        working-directory: installer
        run: |
          python3 -m pip install --upgrade pip
          pip install -r packaging/requirements-packaging-linux.txt

      - name: Build .tar.gz
        working-directory: installer
        run: bash packaging/build_linux.sh "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "installer/packaging/dist/rapport-installer-${{ steps.version.outputs.version }}-linux.tar.gz" \
            --clobber

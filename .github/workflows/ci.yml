name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Type check (pyright)
        run: |
          pip install pyright
          pyright app/ --pythonversion 3.11
        continue-on-error: true  # informational only for now

  frontend:
    name: Frontend (Node/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -f ./backend/Dockerfile.playwright-base -t jobtracker-playwright-base:latest ./backend/
          docker build ./backend/
          docker build ./frontend/

  deploy:
    name: Deploy (local)
    runs-on: self-hosted
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    env:
      GIT_SSH_COMMAND: ssh -i /Users/eugengulinsky/.ssh/id_ed25519_github_runner -o StrictHostKeyChecking=no

    steps:
      - name: Pull latest code
        run: git -C /Users/eugengulinsky/code/jobtracker pull

      - name: Rebuild playwright base image if needed
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          REPO=/Users/eugengulinsky/code/jobtracker
          # Hash of files that affect the base image
          CURRENT_HASH=$(cat "$REPO/backend/Dockerfile.playwright-base" "$REPO/backend/requirements.txt" | sha256sum | cut -d' ' -f1)
          HASH_FILE="$REPO/.playwright-base-hash"
          STORED_HASH=$(cat "$HASH_FILE" 2>/dev/null || echo "")
          if [ "$CURRENT_HASH" != "$STORED_HASH" ] || ! docker image inspect jobtracker-playwright-base:latest >/dev/null 2>&1; then
            echo "Rebuilding playwright base image..."
            docker build -f "$REPO/backend/Dockerfile.playwright-base" -t jobtracker-playwright-base:latest "$REPO/backend/"
            echo "$CURRENT_HASH" > "$HASH_FILE"
          else
            echo "Playwright base image up to date, skipping rebuild."
          fi

      - name: Rebuild and restart containers
        env:
          DOCKER_BUILDKIT: "1"
          BUILD_NUMBER: ${{ github.run_number }}
        run: docker compose -f /Users/eugengulinsky/code/jobtracker/docker-compose.yml up -d --build

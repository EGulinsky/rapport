name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Nach den Tests auch deployen?"
        type: boolean
        default: false

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/ --select E,F,W --ignore E501

      - name: Type check (pyright)
        run: |
          pip install pyright
          pyright app/ --pythonversion 3.11
        continue-on-error: true  # informational only for now

      - name: Tests (unit + component + api)
        run: pytest -m "unit or component or api" --junitxml=test-results.xml

      - name: Test-Zusammenfassung
        if: always()
        run: python3 ../.github/scripts/junit_summary.py test-results.xml "Backend" >> "$GITHUB_STEP_SUMMARY"

      - name: Tests (integration) — bei Push auf main oder manuellem Lauf
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: pytest -m integration --junitxml=test-results-integration.xml

      - name: Test-Zusammenfassung (integration)
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: python3 ../.github/scripts/junit_summary.py test-results-integration.xml "Backend Integration" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend (Node/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests (unit + component)
        run: npm run test -- --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Test-Zusammenfassung
        if: always()
        run: python3 ../.github/scripts/junit_summary.py test-results.xml "Frontend" >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Build playwright base image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -f ./backend/Dockerfile.playwright-base -t rapport-playwright-base:latest ./backend/

      - name: Build and start test stack (backend + frontend only)
        run: docker compose -p rapport-test -f docker-compose.test.yml up -d --build backend-test frontend-test

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend after 60s not reachable" >&2
          exit 1

      - name: Run E2E tests
        run: docker compose -p rapport-test -f docker-compose.test.yml run e2e-runner

      - name: Collect test results
        if: always()
        run: |
          docker cp rapport-e2e:/app/e2e/test-results-e2e.xml ./test-results-e2e.xml 2>/dev/null || true

      - name: Test summary
        if: always()
        run: |
          python3 .github/scripts/junit_summary.py test-results-e2e.xml "E2E" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Teardown
        if: always()
        run: docker compose -p rapport-test -f docker-compose.test.yml down -v

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy)

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -f ./backend/Dockerfile.playwright-base -t rapport-playwright-base:latest ./backend/
          docker build ./backend/
          docker build ./frontend/

  deploy:
    name: Deploy (local)
    runs-on: self-hosted
    needs: [backend, frontend, e2e, docker]
    # event_name-Guard zusätzlich zum ref-Check: self-hosted-Jobs dürfen nie durch einen
    # pull_request-Event (auch von einem Fork) getriggert werden können. Manueller
    # workflow_dispatch-Lauf deployt nur, wenn der "deploy"-Input explizit gesetzt wurde —
    # so lässt sich wie mit "make test" vs. "make deploy" gezielt nur testen.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy)

    env:
      GIT_SSH_COMMAND: ssh -i /Users/eugengulinsky/.ssh/id_ed25519_github_runner -o StrictHostKeyChecking=no

    steps:
      - name: Pull latest code
        run: |
          git -C /Users/eugengulinsky/code/rapport fetch origin main
          git -C /Users/eugengulinsky/code/rapport reset --hard origin/main

      - name: App-Version ermitteln
        id: version
        run: |
          VERSION=$(grep -m1 "version: '" /Users/eugengulinsky/code/rapport/frontend/src/components/ChangelogModal.tsx | sed "s/.*version: '\([^']*\)'.*/\1/")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rebuild playwright base image if needed
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          REPO=/Users/eugengulinsky/code/rapport
          # Hash of files that affect the base image
          CURRENT_HASH=$(cat "$REPO/backend/Dockerfile.playwright-base" "$REPO/backend/requirements.txt" | sha256sum | cut -d' ' -f1)
          HASH_FILE="$REPO/.playwright-base-hash"
          STORED_HASH=$(cat "$HASH_FILE" 2>/dev/null || echo "")
          if [ "$CURRENT_HASH" != "$STORED_HASH" ] || ! docker image inspect rapport-playwright-base:latest >/dev/null 2>&1; then
            echo "Rebuilding playwright base image..."
            docker build -f "$REPO/backend/Dockerfile.playwright-base" -t rapport-playwright-base:latest "$REPO/backend/"
            echo "$CURRENT_HASH" > "$HASH_FILE"
          else
            echo "Playwright base image up to date, skipping rebuild."
          fi

      - name: Rebuild and restart containers
        env:
          DOCKER_BUILDKIT: "1"
          BUILD_NUMBER: ${{ github.run_number }}
        run: docker compose -f /Users/eugengulinsky/code/rapport/docker-compose.yml up -d --build

      - name: Warte auf Backend
        run: |
          echo "Warte auf Backend..."
          for i in $(seq 1 30); do
            if curl -sf https://backend.rapport.orb.local/health > /dev/null 2>&1; then
              echo "Backend bereit."
              exit 0
            fi
            sleep 2
          done
          echo "Backend nach 60s nicht erreichbar" >&2
          exit 1

      - name: Smoke-Test (Backend Health)
        run: |
          echo "### Backend Health" >> $GITHUB_STEP_SUMMARY
          HEALTH=$(curl -sf https://backend.rapport.orb.local/health)
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'Expected ok, got {d}'; print('✅ Backend health: OK')"
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$HEALTH" | python3 -m json.tool >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Smoke-Test (Frontend lädt)
        run: |
          echo "Warte auf Frontend..."
          i=0
          while [ $i -lt 30 ]; do
            FRONTEND=$(curl -sf http://localhost:3000/ 2>/dev/null)
            if [ -n "$FRONTEND" ] && echo "$FRONTEND" | grep -q "Rapport"; then
              echo "Frontend bereit (Versuch $((i+1)))."
              break
            fi
            i=$((i+1))
            echo "  Versuch $i — warte 1s..."
            sleep 1
          done
          if [ -z "$FRONTEND" ]; then
            echo "❌ Frontend nach 30s nicht erreichbar" >> $GITHUB_STEP_SUMMARY
            curl -sv http://localhost:3000/ 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Frontend: 'Rapport' gefunden" >> $GITHUB_STEP_SUMMARY

      - name: Smoke-Test (Login + Applications API)
        run: |
          SETUP=$(curl -sf -X POST https://backend.rapport.orb.local/api/e2e/setup-user \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke-test@rapport.local","password":"SmokeTest2026!"}' 2>/dev/null || echo '{"access_token":"","token_type":"bearer"}')
          TOKEN=$(echo "$SETUP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          if [ -n "$TOKEN" ]; then
            echo "✅ E2E-Benutzer angelegt, Token erhalten" >> $GITHUB_STEP_SUMMARY
            APPS=$(curl -sf https://backend.rapport.orb.local/api/applications/ \
              -H "Authorization: Bearer $TOKEN")
            COUNT=$(echo "$APPS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            echo "✅ Applications-API: $COUNT Einträge" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ E2E-Setup nicht verfügbar (kein E2E_TESTING) — Login-Test übersprungen" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Browser öffnen und Sound
        run: |
          TIME=$(date '+%H:%M')
          osascript -e "display notification \"${{ steps.version.outputs.version }} (Build ${{ github.run_number }}) erfolgreich deployt (${TIME})\" with title \"rapport CI ✓\" sound name \"Glass\""
          osascript -e 'open location "https://frontend.rapport.orb.local/"'

  notify-failure:
    name: Fehler-Benachrichtigung
    runs-on: self-hosted
    needs: [backend, frontend, docker, deploy, e2e]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && always() && contains(needs.*.result, 'failure')
    steps:
      - name: macOS-Notification + Claude-Signal
        run: |
          FAILED=""
          [ "${{ needs.backend.result }}"  = "failure" ] && FAILED="${FAILED} Backend"
          [ "${{ needs.frontend.result }}" = "failure" ] && FAILED="${FAILED} Frontend"
          [ "${{ needs.e2e.result }}"      = "failure" ] && FAILED="${FAILED} E2E"
          [ "${{ needs.docker.result }}"   = "failure" ] && FAILED="${FAILED} Docker"
          [ "${{ needs.deploy.result }}"   = "failure" ] && FAILED="${FAILED} Deploy"
          TIME=$(date '+%H:%M')
          osascript -e "display notification \"Fehlgeschlagen:${FAILED} — Build ${{ github.run_number }} (${TIME})\" with title \"rapport CI ✗\" sound name \"Basso\""
          echo "$(date '+%Y-%m-%d %H:%M:%S') FAILED build=${{ github.run_number }} jobs=${FAILED}" >> /tmp/ci_failures.log

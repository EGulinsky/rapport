[pytest]
testpaths = tests
markers =
    unit: L0 - reine Funktionen, keine DB/Netzwerk
    component: L1 - mit Test-DB, keine Fremdsysteme
    api: L2 - FastAPI TestClient gegen echte Router
    integration: L3 - volle Flows, Fremdsysteme gemockt
    slow: explizit langsame Fälle (auch innerhalb einer Stufe)
addopts = --strict-markers
asyncio_mode = auto
